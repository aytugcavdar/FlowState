<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="FlowState — Günlük mantık bulmaca oyunu. Tile'ları döndür, akışları yönlendir, bulmacayı çöz." />
  <meta name="theme-color" content="#0a0e1a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <title>FlowState — Logic Puzzle</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="src/main.tsx"></script>
  <script type="module">
    // Service Worker yalnızca production ortamında kayıt olur.
    // Geliştirme ortamında (npm run dev) SW devre dışıdır.
    if ('serviceWorker' in navigator && import.meta.env.PROD) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => { });
      });
    } else if ('serviceWorker' in navigator && !import.meta.env.PROD) {
      // Dev modunda mevcut tüm SW'leri kaldır
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => reg.unregister());
      });
    }
  </script>
</body>

</html>
